  <div style="max-width:896px;margin:10px auto 0;padding:0 16px;text-align:center;color:#64748b;font-size:13px;font-family:'YPairing','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif">타입 칸을 눌러 최애 포켓몬을 고르세요. 고른 포켓몬은 꾹 눌러 드래그하면 칸 안에서 위치를 옮길 수 있어요 (뗀 뒤엔 고정).</div>
  <div id="root"></div>
  <script>
  // Save fallback for iOS / in-app browsers where a.download is unreliable.
  (function(){
    function isInApp(){ return /KAKAOTALK|Instagram|FBAN|FBAV|FB_IAB|Line\/|NAVER|DaumApps|Snapchat|TwitterAndroid|musical_ly|TikTok|Whale/i.test(navigator.userAgent||''); }
    function isIOS(){ var ua=navigator.userAgent||''; return /iPhone|iPad|iPod/i.test(ua)||(/Macintosh/.test(ua)&&'ontouchend' in document); }
    function canDownload(){ var a=document.createElement('a'); return ('download' in a)&&!isIOS()&&!isInApp(); }
    function d2b(u){ var arr=u.split(','),mime=(arr[0].match(/:(.*?);/)||[])[1]||'image/png',bin=atob(arr[1]),n=bin.length,u8=new Uint8Array(n); while(n--)u8[n]=bin.charCodeAt(n); return new Blob([u8],{type:mime}); }
    var mask,img,openA,dlA,cur=null;
    function close(){ if(mask) mask.style.display='none'; if(cur){ try{URL.revokeObjectURL(cur);}catch(e){} cur=null; } }
    function build(){
      mask=document.createElement('div');
      mask.style.cssText='position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:99999;padding:16px';
      var m=document.createElement('div');
      m.style.cssText='background:#fff;border-radius:18px;max-width:600px;width:100%;max-height:86vh;overflow:auto;position:relative;padding:18px;box-sizing:border-box';
      var x=document.createElement('button'); x.textContent='×'; x.style.cssText='position:absolute;top:10px;right:14px;border:none;background:none;font-size:22px;cursor:pointer;color:#64748b'; x.onclick=close;
      var h=document.createElement('h3'); h.textContent='이미지 저장'; h.style.cssText='margin:0 0 8px;font-size:17px';
      var p=document.createElement('p'); p.innerHTML="이미지를 <b>길게 눌러</b> '사진에 저장'을 선택하세요.<br>안 되면 아래 <b>새 탭에서 열기</b>로 연 뒤 저장하면 돼요."; p.style.cssText='margin:0 0 12px;font-size:13px;line-height:1.6;color:#64748b';
      img=document.createElement('img'); img.alt='저장할 이미지'; img.style.cssText='max-width:100%;display:block;margin:0 auto;border-radius:10px;border:1px solid #e5eefb';
      var row=document.createElement('div'); row.style.cssText='margin-top:14px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap';
      openA=document.createElement('a'); openA.target='_blank'; openA.rel='noopener'; openA.textContent='새 탭에서 열기'; openA.style.cssText='padding:11px 18px;border-radius:12px;border:1.5px solid #c9dcf6;background:#fff;color:#334155;font-weight:800;font-size:14px;text-decoration:none;display:inline-flex;align-items:center';
      dlA=document.createElement('a'); dlA.textContent='다운로드'; dlA.style.cssText='padding:11px 18px;border-radius:12px;border:none;background:#141414;color:#fff;font-weight:800;font-size:14px;text-decoration:none;display:inline-flex;align-items:center';
      row.appendChild(openA); row.appendChild(dlA);
      m.appendChild(x); m.appendChild(h); m.appendChild(p); m.appendChild(img); m.appendChild(row);
      mask.appendChild(m); document.body.appendChild(mask);
      mask.addEventListener('click',function(e){ if(e.target===mask) close(); });
    }
    window.__deliverImage=function(url,filename){
      if(canDownload()){ var a=document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); a.remove(); return; }
      if(!mask) build();
      if(cur){ try{URL.revokeObjectURL(cur);}catch(e){} cur=null; }
      var obj=url; try{ obj=URL.createObjectURL(d2b(url)); cur=obj; }catch(e){}
      img.src=obj; openA.href=obj; dlA.href=url; dlA.download=filename;
      mask.style.display='flex';
    };
  })();
  </script>
